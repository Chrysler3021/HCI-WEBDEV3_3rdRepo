<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZamboCollect — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="card">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v5M14 11v5"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </div>
      <span class="logo-text">ZamboCollect</span>
    </div>

    <div class="left-body">
      <h1 class="headline">Welcome back<br/>to a cleaner<br/>Zamboanga City.</h1>
      <p class="subtext">Sign in to report waste, track collections, and stay connected with your barangay's cleanup effort.</p>
    </div>

    <div class="stats">
      <div>
        <div class="stat-value">98</div>
        <div class="stat-label">Barangays</div>
      </div>
      <div>
        <div class="stat-value">2.4k</div>
        <div class="stat-label">Reports Today</div>
      </div>
      <div>
        <div class="stat-value">91%</div>
        <div class="stat-label">Collection Rate</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="form-title">Sign in</div>
    <div class="form-subtitle">Welcome back — choose your role to continue</div>

    <div class="form-panel">

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#9cad8e" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          <input type="email" placeholder="you@example.com" id="loginEmail"/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap has-eye">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="loginPass" placeholder="Enter your password"/>
          <svg class="eye" id="eyeBtn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label>Sign in as</label>
        <div class="role-selector">

          <input type="radio" name="role" id="role-citizen" value="citizen" checked hidden/>
          <label class="role-option" for="role-citizen">
            <div class="role-emoji">👤</div>
            <div class="role-name">Citizen</div>
          </label>

          <input type="radio" name="role" id="role-officer" value="officer" hidden/>
          <label class="role-option" for="role-officer">
            <div class="role-emoji">🏛</div>
            <div class="role-name">Officer</div>
          </label>

          <input type="radio" name="role" id="role-driver" value="driver" hidden/>
          <label class="role-option" for="role-driver">
            <div class="role-emoji">🚛</div>
            <div class="role-name">Driver</div>
          </label>

          <input type="radio" name="role" id="role-admin" value="admin" hidden/>
          <label class="role-option" for="role-admin">
            <div class="role-emoji">⚙️</div>
            <div class="role-name">Admin</div>
          </label>

        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="signInBtn">Sign In →</button>
      </div>

      <div class="signin-row">Don't have an account? <a href="Register.html">Create one</a></div>

    </div>
  </div>

</div>

<script>
  // Role selection highlight
  document.querySelectorAll('.role-option').forEach(option => {
    option.addEventListener('click', function () {
      document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
      this.classList.add('selected');
    });
  });

  // Default highlight citizen on load
  document.querySelector('label[for="role-citizen"]').classList.add('selected');

  // Password toggle
  document.getElementById('eyeBtn').addEventListener('click', function () {
    const inp = document.getElementById('loginPass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // Sign in routing
  document.getElementById('signInBtn').addEventListener('click', function () {
    const role = document.querySelector('input[name="role"]:checked').value;
    const routes = {
      citizen: 'dashboard-citizen.html',
      officer: 'dashboard-officer.html',
      driver:  'dashboard-driver.html',
      admin:   'admin-dashboard.html'
    };
    window.location.href = routes[role];
  });
</script>

</body>
</html>
